name: skev-runtime CI

on:
  push:
    branches: ["main", "phase-e/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── MUST: build + test (native runners) ────────────────────
  must-native:
    name: "MUST · ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            # macos-15-intel: last x86_64 macOS runner (GitHub sunset Aug 2027)
            os: macos-15-intel
          - target: aarch64-apple-darwin
            # macos-15 (arm64): pinned explicitly; macos-latest flips to macos-26 Jun 2026
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p skev-runtime --release
      - name: Test (bare)
        run: cargo test -p skev-runtime
      - name: Test (leak-check)
        run: cargo test -p skev-runtime --features leak-check

  # ── MUST: aarch64 Linux via cross-rs + QEMU ────────────────
  must-aarch64-linux:
    name: "MUST · aarch64-unknown-linux-gnu (cross)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (cross)
        run: cross build -p skev-runtime --release --target aarch64-unknown-linux-gnu
      - name: Test (cross + QEMU)
        run: cross test -p skev-runtime --target aarch64-unknown-linux-gnu
      - name: Test leak-check (cross + QEMU)
        run: cross test -p skev-runtime --target aarch64-unknown-linux-gnu --features leak-check

  # ── SHOULD: build only (no test runner available) ──────────
  should-build-only:
    name: "SHOULD · ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            os: macos-15
          - target: aarch64-linux-android
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Add Android cross-linker (android target only)
        if: matrix.target == 'aarch64-linux-android'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build only
        run: cargo build -p skev-runtime --release --target ${{ matrix.target }}
